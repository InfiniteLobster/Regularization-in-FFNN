defaults:
  - dataset: default
  - logger: wandb
  - search: default
  - model: default
  - _self_
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      model.model_info.hidden_info: '[128],[64],[32],[16],[8]'
      model.model_info.activ_info: '["relu","linear"]'
      model.train_method.type: SGD
      model.train_method.reg_layer: [0,0]
      logger.project: Architectures
